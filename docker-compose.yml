services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: taskque
      POSTGRES_PASSWORD: taskque123
      POSTGRES_DB: taskque
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://taskque:taskque123@db:5432/taskque
      PORT: 3002
      JWT_SECRET: taskque-production-secret-altere-isso
    depends_on:
      db:
        condition: service_started

volumes:
  pgdata:
